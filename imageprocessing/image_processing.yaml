  - platform: openalpr_cloud
    scan_interval: 10000
    api_key: !secret openalpr_cloud
    region: gb
    source:
     - entity_id: camera.frontfloodlight

  - platform: tensorflow
    scan_interval: 600
    source:
      - entity_id: camera.frontdoor
    file_out:
      - "/tmp/frontdoor_{{ now().strftime('%Y%m%d_%H%M%S') }}.jpg"
    model:
      graph: /home/rob/.homeassistant/tensorflow/frozen_inference_graph.pb
      area:
        # Exclude top 13% of image
        top: 0.07

  - platform: tensorflow
    scan_interval: 600
    source:
      - entity_id: camera.frontfloodlight
    file_out:
      - "/tmp/frontfloodlight_{{ now().strftime('%Y%m%d_%H%M%S') }}.jpg"
    model:
      graph: /home/rob/.homeassistant/tensorflow/frozen_inference_graph.pb

  - platform: tensorflow
    scan_interval: 600
    source:
      - entity_id: camera.garage
    file_out:
      - "/tmp/garage_{{ now().strftime('%Y%m%d_%H%M%S') }}.jpg"
    model:
      graph: /home/rob/.homeassistant/tensorflow/frozen_inference_graph.pb

  - platform: facebox
    ip_address: localhost
    port: 8088
    source:
      - entity_id: camera.frontdoor

  - platform: amazon_rekognition
    aws_access_key_id: !secret aws_access_key
    aws_secret_access_key: !secret aws_secret_key
    region_name: eu-west-1
    target: Person
    scan_interval: 604800
    source:
      - entity_id: camera.gac

  - platform: amazon_rekognition
    aws_access_key_id: !secret aws_access_key
    aws_secret_access_key: !secret aws_secret_key
    region_name: eu-west-1
    target: Person
    scan_interval: 604800
    source:
      - entity_id: camera.src

  - platform: amazon_rekognition
    aws_access_key_id: !secret aws_access_key
    aws_secret_access_key: !secret aws_secret_key
    region_name: eu-west-1
    target: Person
    scan_interval: 604800
    source:
      - entity_id: camera.bdc

  - platform: amazon_rekognition
    aws_access_key_id: !secret aws_access_key
