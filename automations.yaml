- id: Turn on Porch light on when there is movement
  alias: Turn on Porch light on when there is movement
  trigger:
  - platform: state
    entity_id: binary_sensor.ring_frontfloodlight_motion
    from: 'off'
    to: 'on'
  - platform: state
    entity_id: binary_sensor.ring_frontdoor_motion
    from: 'off'
    to: 'on'
  condition:
    condition: or
    conditions:
    - condition: time
      after: '23:00:00'
    - condition: sun
      before: sunrise
    - condition: state
      entity_id: switch.porchlight
      state: 'Off'
  action:
    service: switch.turn_on
    entity_id: switch.porchlight
- id: Porch Light on at Sunset
  alias: Porch Light on at Sunset
