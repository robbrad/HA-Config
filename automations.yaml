    weekday:
    - mon
    - tue
    - wed
    - thu
    - fri
    - sat
    - sun
  action:
  - service: climate.set_temperature
    entity_id: climate.underfloorheating
    data:
      temperature: 15
  - service: climate.turn_off
    entity_id: climate.underfloorheating
  - service: climate.set_hvac_mode
    data:
      entity_id: climate.underfloorheating
      hvac_mode: off
