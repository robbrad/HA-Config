- id: Air Data Alert
  alias: Air Data Alert
  trigger:
    platform: numeric_state
    entity_id: sensor.Air_Data_Received_in_2hrs
    below: 13
  action:
  - service: notify.push_bullet
    data:
      target: device/robsphone
      message: No Air Data received for an hour
      title: IoT Data
- id: Kirsty To Stepping Hill Alert
  alias: Kirsty To Stepping Hill Alert
  trigger:
  - platform: time
    at: 07:45:00
  condition:
    condition: and
    conditions:
    - condition: time
      after: 07:45:00
      before: 08:00:00
      weekday:
      - mon
      - tue
      - wed
  action:
  - service: notify.push_bullet
    data:
      target: device/kirstysphone
      message: Your commute will currently take {{ states('sensor.KirstyHome2Work')
        }} minutes
      title: Kirsty Commute
- id: Notify Me when its time to leave for work
  alias: Notify Me when its time to leave for work
  trigger:
  - platform: state
    entity_id: sensor.time_to_leave_for_work
    to: 'True'
    from: 'False'
  condition:
    condition: and
    conditions:
    - condition: numeric_state
      entity_id: sensor.ha_runtime_in_minutes
      above: 1
    - condition: state
      entity_id: binary_sensor.workday_sensor
      state: 'on'
  action:
  - service: notify.push_bullet
    data:
      message: Based on current traffic, you have 10 minutes to leave if you want
        to get to work by 9:00am.  Traffic is {{ states('sensor.my_traffic_density_to_work')
        }} today.
      target: device/robsphone
      title: Rob Time to Leave for Work
- id: Garage Door Opening Alert
  alias: Garage Door Opening Alert
