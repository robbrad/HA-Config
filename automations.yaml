    entity_id: switch.porchlight
- id: Turn off Porch light 5 minutes after last movement
  alias: Turn off Porch light 5 minutes after last movement
  trigger:
  - entity_id: binary_sensor.ring_frontfloodlight_motion
    for: 0:05:00
    from: 'on'
    platform: state
    to: 'off'
  - entity_id: binary_sensor.ring_frontdoor_motion
    for: 0:05:00
    from: 'on'
    platform: state
    to: 'off'
  condition:
  - condition: or
    conditions:
    - after: '23:00:00'
      condition: time
    - before: sunrise
      before_offset: 01:00:00
      condition: sun
  action:
  - entity_id: switch.porchlight
    service: homeassistant.turn_off
